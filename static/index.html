<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReDo!</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={darkMode:'class',theme:{extend:{colors:{surface:'#0f0f13',card:'#16161d',border:'#2a2a35',accent:'#7c5cfc',accentHover:'#9b7fff',muted:'#6b6b80'}}}}</script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jerosoler/Drawflow@0.0.59/dist/drawflow.min.css">
<script src="https://cdn.jsdelivr.net/gh/jerosoler/Drawflow@0.0.59/dist/drawflow.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  body{font-family:'Inter',sans-serif}
  ::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0f0f13}::-webkit-scrollbar-thumb{background:#2a2a35;border-radius:3px}
  @keyframes pulse-glow{0%,100%{box-shadow:0 0 0 0 rgba(124,92,252,.4)}50%{box-shadow:0 0 12px 4px rgba(124,92,252,.15)}}
  .running{animation:pulse-glow 2s infinite}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
  .log-line{animation:fadeIn .15s ease}
  .modal-bg{background:rgba(0,0,0,.6);backdrop-filter:blur(4px)}

  /* Drawflow overrides for dark theme */
  #drawflow{background:#0a0a0f;background-image:radial-gradient(#1a1a25 1px,transparent 1px);background-size:20px 20px}
  .drawflow .drawflow-node{background:#16161d !important;border:1px solid #2a2a35;border-radius:12px;color:#e5e5e5;min-width:160px;padding:0;box-shadow:0 4px 12px rgba(0,0,0,.3)}
  .drawflow .drawflow-node.selected{border-color:#7c5cfc !important;background:#1c1c28 !important;box-shadow:0 0 0 2px rgba(124,92,252,.3)}
  .drawflow .drawflow-node .input,.drawflow .drawflow-node .output{width:12px;height:12px;border-radius:50%;border:2px solid #2a2a35;background:#0f0f13}
  .drawflow .drawflow-node .output{background:#7c5cfc;border-color:#7c5cfc}
  .drawflow .connection .main-path{stroke:#7c5cfc;stroke-width:2;fill:none;marker-end:url(#arrowhead);cursor:pointer}
  .drawflow .connection:hover .main-path{stroke-width:5}
  .drawflow .drawflow-delete{background:#ef4444;border:none;color:white;border-radius:50%}
  .drawflow .point{width:10px;height:10px;background:#7c5cfc;border:2px solid #9b7fff;border-radius:50%;cursor:move}
  .node-inner{padding:12px 16px}
  .node-inner .node-title{font-weight:600;font-size:13px;display:flex;align-items:center;gap:6px}
  .node-inner .node-sub{font-size:10px;color:#6b6b80;margin-top:4px}
  #scroll-to-bottom{position:absolute;bottom:16px;right:20px;z-index:10;width:36px;height:36px;border-radius:9999px;border:none;background:#7c5cfc;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.4);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;transform:translateY(8px)}
  #scroll-to-bottom.visible{opacity:1;pointer-events:auto;transform:translateY(0)}
  #scroll-to-bottom:hover{background:#9b7fff}
</style>
</head>
<body class="bg-surface text-gray-200 h-screen flex flex-col overflow-hidden">

<!-- Header -->
<header class="flex items-center justify-between px-6 py-3 border-b border-border bg-card/50">
  <div class="flex items-center gap-3">
    <span class="text-2xl">🐝</span>
    <h1 class="text-lg font-semibold text-white">ReDo!</h1>
    <span class="text-xs text-muted bg-surface px-2 py-0.5 rounded-full">v0.2</span>
  </div>
  <div class="flex items-center gap-4">
    <!-- Tabs -->
    <div class="flex bg-surface rounded-lg p-0.5 text-xs">
      <button onclick="switchTab('agents')" id="tab-agents" class="tab-btn px-3 py-1.5 rounded-md transition font-medium bg-accent/10 text-accent">Agentes</button>
      <button onclick="switchTab('flow')" id="tab-flow" class="tab-btn px-3 py-1.5 rounded-md transition font-medium text-muted hover:text-white">Flow</button>
      <button onclick="switchTab('run')" id="tab-run" class="tab-btn px-3 py-1.5 rounded-md transition font-medium text-muted hover:text-white">Executar</button>
    </div>
    <div class="flex items-center gap-2 text-xs text-muted">
      <span id="status-dot" class="w-2 h-2 rounded-full bg-emerald-500"></span>
      <span id="status-text">Ready</span>
    </div>
  </div>
</header>

<!-- ═══ TAB: Agents ═══ -->
<div id="view-agents" class="flex-1 flex overflow-hidden">
  <aside class="w-72 border-r border-border bg-card/30 flex flex-col">
    <div class="flex items-center justify-between px-4 py-3 border-b border-border">
      <span class="text-sm font-medium text-muted uppercase tracking-wider">Agentes</span>
      <button onclick="openModal()" class="w-7 h-7 flex items-center justify-center rounded-lg bg-accent/10 text-accent hover:bg-accent/20 transition text-lg leading-none">+</button>
    </div>
    <div id="agent-list" class="flex-1 overflow-y-auto p-2 space-y-1"></div>
  </aside>
  <div class="flex-1 flex items-center justify-center text-muted text-sm" id="agent-detail-area">
    <div class="text-center"><span class="text-4xl block mb-2">🐝</span>Selecione ou crie um agente</div>
  </div>
</div>

<!-- ═══ TAB: Flow ═══ -->
<div id="view-flow" class="flex-1 flex-col overflow-hidden hidden">
  <div class="flex items-center gap-3 px-4 py-2 border-b border-border bg-card/20 text-xs">
    <select id="flow-select" onchange="onFlowSelect()" class="bg-surface border border-border rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:border-accent/50 transition min-w-[160px]">
      <option value="">Nenhum flow</option>
    </select>
    <button onclick="createFlow()" class="px-2 py-1.5 bg-accent/10 text-accent rounded-lg hover:bg-accent/20 transition font-medium">+ Novo</button>
    <button onclick="renameFlow()" class="px-2 py-1.5 bg-surface border border-border rounded-lg hover:border-accent/30 transition text-muted hover:text-white">Renomear</button>
    <button onclick="duplicateFlow()" class="px-2 py-1.5 bg-surface border border-border rounded-lg hover:border-accent/30 transition text-muted hover:text-white">Duplicar</button>
    <button onclick="deleteFlow()" class="px-2 py-1.5 text-muted hover:text-red-400 rounded-lg hover:bg-red-500/10 transition">✕ Deletar</button>
    <div class="border-l border-border h-5 mx-1"></div>
    <button onclick="autoLayout()" class="px-3 py-1.5 bg-surface border border-border rounded-lg hover:border-accent/30 transition text-muted hover:text-white">Auto Layout</button>
    <button onclick="saveFlow()" class="px-3 py-1.5 bg-accent/10 text-accent rounded-lg hover:bg-accent/20 transition font-medium">💾 Salvar</button>
    <span class="text-muted" id="flow-info">Arraste agentes do painel. Conecte saídas → entradas.</span>
  </div>
  <div class="flex flex-1 overflow-hidden">
    <div class="w-48 border-r border-border bg-card/30 p-3 space-y-2 overflow-y-auto" id="flow-palette">
      <div class="text-xs text-muted uppercase tracking-wider mb-2">Arrastar para o canvas</div>
    </div>
    <div class="flex-1" id="drawflow"></div>
  </div>
</div>

<!-- ═══ TAB: Run ═══ -->
<div id="view-run" class="flex-1 flex-col overflow-hidden hidden">
  <!-- Project bar -->
  <div class="flex items-center gap-3 px-5 py-2 border-b border-border bg-card/20">
    <label class="text-xs text-muted">📂</label>
    <select id="project-select" onchange="onProjectChange()" class="flex-1 bg-surface border border-border rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:border-accent/50 transition">
      <option value="">Selecione um projeto...</option>
    </select>
    <button onclick="openProjectModal()" class="px-3 py-1.5 bg-accent/10 text-accent text-xs rounded-lg hover:bg-accent/20 transition font-medium">+ Novo</button>
    <button onclick="deleteProject()" class="px-2 py-1.5 text-muted hover:text-red-400 text-xs rounded-lg hover:bg-red-500/10 transition">✕</button>
    <div class="border-l border-border h-5 mx-1"></div>
    <label class="text-xs text-muted">🔀</label>
    <select id="run-flow-select" class="bg-surface border border-border rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:border-accent/50 transition min-w-[140px]">
      <option value="">Nenhum flow</option>
    </select>
    <button id="btn-open" onclick="openSession()" class="px-3 py-1.5 bg-emerald-500/10 text-emerald-400 text-xs rounded-lg hover:bg-emerald-500/20 transition font-medium hidden">⚡ Abrir</button>
    <button id="btn-close" onclick="closeSession()" class="px-3 py-1.5 bg-red-500/10 text-red-400 text-xs rounded-lg hover:bg-red-500/20 transition font-medium hidden">■ Fechar</button>
  </div>
  <!-- Body: agent boxes left + chat center -->
  <div class="flex flex-1 overflow-hidden">
    <!-- Agent boxes -->
    <div class="w-48 border-r border-border bg-card/30 flex flex-col">
      <div class="text-[10px] text-muted uppercase tracking-wider px-3 pt-3 pb-1">Agentes</div>
      <div class="px-2 pb-1">
        <div onclick="selectChatTarget(null)" id="box-swarm"
          class="agent-box flex items-center gap-2 px-3 py-2 rounded-lg border border-accent/50 bg-accent/5 cursor-pointer hover:bg-accent/10 transition text-xs text-white font-medium">
          🐝 <span>Swarm</span>
        </div>
      </div>
      <div id="run-agents" class="flex-1 overflow-y-auto px-2 pb-2 space-y-1.5"></div>
      <div class="border-t border-border p-2">
        <div onclick="selectChatTarget('__log__')" id="box-__log__" class="agent-box flex items-center gap-2 px-3 py-2 rounded-lg bg-surface border border-border cursor-pointer hover:border-accent/30 transition text-xs text-muted">
          📋 <span>Log</span>
        </div>
      </div>
    </div>
    <!-- Chat area -->
    <div class="flex-1 flex flex-col overflow-hidden relative">
      <div class="px-4 py-2 border-b border-border bg-card/10" id="chat-header">
        <span class="text-sm text-muted">Abra um projeto para começar</span>
      </div>
      <!-- Messages -->
      <div class="flex-1 overflow-y-auto" id="chat-scroll">
        <div id="agent-grid" class="grid grid-cols-1 md:grid-cols-2 gap-3 p-4 h-full auto-rows-fr"></div>
        <div id="chat-messages" class="px-4 py-3 space-y-3 max-w-3xl mx-auto hidden"></div>
        <div id="raw-log" class="px-4 py-3 space-y-1 font-mono text-xs hidden"></div>
      </div>
      <button id="scroll-to-bottom" aria-label="Scroll to bottom">↓</button>
      <!-- Input (bottom) -->
      <div class="px-4 py-3 border-t border-border bg-card/20">
        <div class="flex gap-3 max-w-3xl mx-auto">
          <input id="chat-input" type="text" placeholder="Mensagem para o swarm... (@agente para falar direto)"
            class="flex-1 bg-surface border border-border rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-accent/50 placeholder-muted transition"
            onkeydown="if(event.key==='Enter')sendChat()" disabled>
          <button id="btn-send" onclick="sendChat()" disabled
            class="px-4 py-2.5 bg-accent hover:bg-accentHover text-white text-sm font-medium rounded-xl transition disabled:opacity-30">
            Enviar</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ═══ Agent Modal ═══ -->
<div id="modal" class="fixed inset-0 modal-bg z-50 hidden flex items-center justify-center">
  <div class="bg-card border border-border rounded-2xl w-[520px] max-h-[90vh] overflow-y-auto shadow-2xl">
    <div class="flex items-center justify-between px-6 py-4 border-b border-border">
      <h2 id="modal-title" class="text-base font-semibold text-white">Novo Agente</h2>
      <button onclick="closeModal()" class="text-muted hover:text-white transition">✕</button>
    </div>
    <div class="p-6 space-y-4">
      <div class="grid grid-cols-2 gap-4">
        <div><label class="block text-xs text-muted mb-1.5">ID</label>
          <input id="m-id" class="w-full bg-surface border border-border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-accent/50 transition" placeholder="analyst"></div>
        <div><label class="block text-xs text-muted mb-1.5">Nome</label>
          <input id="m-name" class="w-full bg-surface border border-border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-accent/50 transition" placeholder="Analyst"></div>
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div><label class="block text-xs text-muted mb-1.5">Cor</label>
          <select id="m-color" class="w-full bg-surface border border-border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-accent/50 transition">
            <option value="#60a5fa">Azul</option><option value="#34d399">Verde</option><option value="#f472b6">Rosa</option>
            <option value="#fbbf24">Amarelo</option><option value="#a78bfa">Roxo</option><option value="#fb923c">Laranja</option><option value="#22d3ee">Ciano</option>
          </select></div>
        <div><label class="block text-xs text-muted mb-1.5">Modelo</label>
          <input id="m-model" class="w-full bg-surface border border-border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-accent/50 transition" placeholder="auto"></div>
      </div>
      <div><label class="block text-xs text-muted mb-1.5">Persona</label>
        <textarea id="m-persona" rows="4" class="w-full bg-surface border border-border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-accent/50 transition resize-none" placeholder="Você é um..."></textarea></div>
      <div><label class="block text-xs text-muted mb-1.5">MCP Servers</label>
        <div class="flex gap-1 mb-2 flex-wrap">
          <span class="text-[10px] text-muted mr-1 py-1">Presets:</span>
          <button type="button" onclick="addMcpPreset('browser')" class="text-[10px] px-2 py-1 rounded bg-surface border border-border hover:border-accent/30 text-muted hover:text-white transition">🌐 Browser</button>
          <button type="button" onclick="addMcpPreset('dataflow')" class="text-[10px] px-2 py-1 rounded bg-surface border border-border hover:border-accent/30 text-muted hover:text-white transition">🔀 Dataflow</button>
          <button type="button" onclick="addMcpPreset('knowledge')" class="text-[10px] px-2 py-1 rounded bg-surface border border-border hover:border-accent/30 text-muted hover:text-white transition">📚 Knowledge</button>
        </div>
        <div id="m-mcps-list" class="space-y-2 mb-2"></div>
        <button type="button" onclick="addMcpRow()" class="text-xs text-accent hover:text-accentHover transition">+ Adicionar MCP manual</button>
      </div>
    </div>
    <div class="flex justify-end gap-3 px-6 py-4 border-t border-border">
      <button onclick="closeModal()" class="px-4 py-2 text-sm text-muted hover:text-white transition rounded-lg">Cancelar</button>
      <button onclick="saveAgent()" class="px-5 py-2 bg-accent hover:bg-accentHover text-white text-sm font-medium rounded-lg transition">Salvar</button>
    </div>
  </div>
</div>

<!-- ═══ Project Modal ═══ -->
<div id="project-modal" class="fixed inset-0 modal-bg z-50 hidden flex items-center justify-center">
  <div class="bg-card border border-border rounded-2xl w-[400px] shadow-2xl">
    <div class="flex items-center justify-between px-6 py-4 border-b border-border">
      <h2 class="text-base font-semibold text-white">Novo Projeto</h2>
      <button onclick="closeProjectModal()" class="text-muted hover:text-white transition">✕</button>
    </div>
    <div class="p-6 space-y-4">
      <div><label class="block text-xs text-muted mb-1.5">Nome</label>
        <input id="p-name" class="w-full bg-surface border border-border rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-accent/50 transition" placeholder="Meu Projeto"></div>
      <div><label class="block text-xs text-muted mb-1.5">Caminho do diretório</label>
        <input id="p-path" class="w-full bg-surface border border-border rounded-lg px-3 py-2 text-sm font-mono focus:outline-none focus:border-accent/50 transition" placeholder="/home/user/meu-projeto"></div>
    </div>
    <div class="flex justify-end gap-3 px-6 py-4 border-t border-border">
      <button onclick="closeProjectModal()" class="px-4 py-2 text-sm text-muted hover:text-white transition rounded-lg">Cancelar</button>
      <button onclick="saveProject()" class="px-5 py-2 bg-accent hover:bg-accentHover text-white text-sm font-medium rounded-lg transition">Criar</button>
    </div>
  </div>
</div>

<script>
const API = '/api';
let agents = [];
let projectsList = [];
let flows = [];
let currentFlowId = null;
let editingId = null;
let editor = null; // Drawflow instance

// ── Projects ─────────────────────────────────────────────────────────────

async function loadProjects() {
  projectsList = await (await fetch(`${API}/projects`)).json();
  const sel = document.getElementById('project-select');
  const cur = sel?.value;
  sel.innerHTML = '<option value="">Selecione um projeto...</option>' +
    projectsList.map(p => `<option value="${p.id}" ${p.id===cur?'selected':''}>${p.name} — ${p.path}</option>`).join('');
}
function openProjectModal() { document.getElementById('project-modal').classList.remove('hidden'); }
function closeProjectModal() { document.getElementById('project-modal').classList.add('hidden'); }
async function saveProject() {
  const name = document.getElementById('p-name').value.trim();
  const path = document.getElementById('p-path').value.trim();
  if (!name || !path) return;
  const id = name.toLowerCase().replace(/[^a-z0-9]+/g, '-');
  await fetch(`${API}/projects`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id,name,path}) });
  closeProjectModal();
  await loadProjects();
  document.getElementById('project-select').value = id;
  onProjectChange();
}
async function deleteProject() {
  const id = document.getElementById('project-select').value;
  if (!id || !confirm('Remover projeto?')) return;
  await fetch(`${API}/projects/${id}`, {method:'DELETE'});
  loadProjects();
}
async function onProjectChange() {
  const id = document.getElementById('project-select').value;
  if (!id) { document.getElementById('btn-resume').classList.add('hidden'); return; }
  try {
    const r = await fetch(`${API}/swarm-state?project_id=${id}`);
    const data = await r.json();
    const btn = document.getElementById('btn-resume');
    if (data.exists) { btn.classList.remove('hidden'); btn.title = `Round ${data.round_num}, agent: ${data.current_agent_id}`; }
    else { btn.classList.add('hidden'); }
  } catch(e) { document.getElementById('btn-resume').classList.add('hidden'); }
}

// ── MCP rows ─────────────────────────────────────────────────────────────

function slugify(name) { return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, ''); }

async function loadFlows() {
  flows = await (await fetch(`${API}/flows`)).json();
  const opts = flows.map(f => `<option value="${f.id}">${escHtml(f.name)}</option>`).join('');
  for (const sel of [document.getElementById('flow-select'), document.getElementById('run-flow-select')]) {
    const cur = sel.value;
    sel.innerHTML = '<option value="">Nenhum flow</option>' + opts;
    if (flows.find(f => f.id === cur)) sel.value = cur;
    else if (flows.length) sel.value = flows[0].id;
  }
  if (!currentFlowId && flows.length) currentFlowId = flows[0].id;
  document.getElementById('flow-select').value = currentFlowId || '';
}

function onFlowSelect() {
  currentFlowId = document.getElementById('flow-select').value || null;
  if (drawflowReady && currentFlowId) loadFlow();
}

async function createFlow() {
  const name = prompt('Nome do novo flow:');
  if (!name) return;
  const id = slugify(name);
  await fetch(`${API}/flows`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id, name, nodes:[], edges:[], start_node:''}) });
  await loadFlows();
  currentFlowId = id;
  document.getElementById('flow-select').value = id;
  if (drawflowReady) loadFlow();
}

async function deleteFlow() {
  if (!currentFlowId || !confirm('Remover este flow?')) return;
  await fetch(`${API}/flows/${currentFlowId}`, {method:'DELETE'});
  currentFlowId = null;
  await loadFlows();
  if (drawflowReady) { if (currentFlowId) loadFlow(); else editor.clear(); }
}

async function renameFlow() {
  if (!currentFlowId) return;
  const fd = flows.find(f => f.id === currentFlowId);
  if (!fd) return;
  const name = prompt('Novo nome:', fd.name);
  if (!name || name === fd.name) return;
  fd.name = name;
  await fetch(`${API}/flows/${currentFlowId}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(fd) });
  await loadFlows();
}

async function duplicateFlow() {
  if (!currentFlowId) return;
  const fd = flows.find(f => f.id === currentFlowId);
  if (!fd) return;
  const name = prompt('Nome da cópia:', fd.name + ' (cópia)');
  if (!name) return;
  const id = slugify(name);
  await fetch(`${API}/flows`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({...fd, id, name}) });
  await loadFlows();
  currentFlowId = id;
  document.getElementById('flow-select').value = id;
  if (drawflowReady) loadFlow();
}

const MCP_PRESETS = {
  browser:   { command: 'uv', args: ['--directory', '/mnt/c/Users/jlortiz/Desktop/testes/browser-mcp', 'run', 'python', 'server.py'] },
  dataflow:  { command: 'uv', args: ['--directory', '/mnt/c/Users/jlortiz/Desktop/testes/dataflow-mcp', 'run', 'python', 'server.py'] },
  knowledge: { command: 'uv', args: ['--directory', '/mnt/c/Users/jlortiz/Desktop/testes/knowledge-mcp', 'run', 'python', 'server.py'] },
};

function addMcpPreset(name) {
  // Don't add if already exists
  const existing = [...document.querySelectorAll('#m-mcps-list .mcp-name')].map(e => e.value.trim());
  if (existing.includes(name)) return;
  const p = MCP_PRESETS[name];
  addMcpRow(name, p.command, p.args.join(', '));
}

function addMcpRow(name='', command='', args='') {
  const list = document.getElementById('m-mcps-list');
  const row = document.createElement('div');
  row.className = 'flex gap-2 items-start bg-surface/50 border border-border rounded-lg p-2';
  row.innerHTML = `
    <div class="flex-1 space-y-1.5">
      <input class="mcp-name w-full bg-surface border border-border rounded px-2 py-1 text-xs focus:outline-none focus:border-accent/50 transition" placeholder="Nome (ex: browser)" value="${escHtml(name)}">
      <input class="mcp-cmd w-full bg-surface border border-border rounded px-2 py-1 text-xs font-mono focus:outline-none focus:border-accent/50 transition" placeholder="Comando (ex: uv)" value="${escHtml(command)}">
      <input class="mcp-args w-full bg-surface border border-border rounded px-2 py-1 text-xs font-mono focus:outline-none focus:border-accent/50 transition" placeholder="Args separados por vírgula (ex: --directory,/path,run,server.py)" value="${escHtml(args)}">
    </div>
    <button onclick="this.parentElement.remove()" class="text-muted hover:text-red-400 text-xs mt-1 px-1">✕</button>`;
  list.appendChild(row);
}

function getMcpsFromForm() {
  const mcps = {};
  document.querySelectorAll('#m-mcps-list > div').forEach(row => {
    const name = row.querySelector('.mcp-name').value.trim();
    const cmd = row.querySelector('.mcp-cmd').value.trim();
    const argsRaw = row.querySelector('.mcp-args').value.trim();
    if (!name || !cmd) return;
    mcps[name] = { command: cmd, args: argsRaw ? argsRaw.split(',').map(s => s.trim()) : [], timeout: 120000 };
  });
  return mcps;
}

function populateMcpRows(mcps) {
  document.getElementById('m-mcps-list').innerHTML = '';
  if (!mcps) return;
  for (const [name, cfg] of Object.entries(mcps)) {
    addMcpRow(name, cfg.command || '', (cfg.args || []).join(', '));
  }
}

let drawflowReady = false;
let startNodeId = '';  // agent_id of the start node

function renderPalette() {
  const el = document.getElementById('flow-palette');
  el.innerHTML = '<div class="text-xs text-muted uppercase tracking-wider mb-2">Arrastar para o canvas</div>' +
    agents.map(a => `
      <div class="flex items-center gap-2 px-3 py-2 rounded-lg bg-surface border border-border cursor-grab hover:border-accent/30 transition text-xs"
           draggable="true" ondragstart="dragStart(event,'${a.id}')">
        <span class="w-2 h-2 rounded-full" style="background:${a.color}"></span>
        <span class="text-white font-medium">${a.name}</span>
      </div>`).join('');
}

function dragStart(ev, agentId) { ev.dataTransfer.setData('agentId', agentId); }

function nodeHtml(a, isStart) {
  return `<div class="node-inner">
    <div class="node-title"><span class="w-2 h-2 rounded-full" style="background:${a.color}"></span>${isStart ? '⚡ ' : ''}${a.name}</div>
    <div class="node-sub">${a.id}${isStart ? ' · início' : ''}</div>
  </div>`;
}

function refreshStartBadges() {
  const raw = editor.drawflow.drawflow.Home.data;
  for (const [nid, n] of Object.entries(raw)) {
    const a = agents.find(x => x.id === n.data?.agentId);
    if (!a) continue;
    const isStart = n.data.agentId === startNodeId;
    const el = document.getElementById('node-' + nid);
    if (el) {
      const content = el.querySelector('.drawflow_content_node');
      if (content) content.innerHTML = nodeHtml(a, isStart);
    }
    // Visual border
    el?.style.setProperty('border-color', isStart ? '#7c5cfc' : '#2a2a35');
    el?.style.setProperty('border-width', isStart ? '2px' : '1px');
  }
}

function initDrawflow() {
  if (drawflowReady) return;
  drawflowReady = true;
  const container = document.getElementById('drawflow');
  editor = new Drawflow(container);
  editor.reroute = true;
  editor.curvature = 0.3;
  editor.reroute_curvature_start_end = 0.3;
  editor.reroute_curvature = 0.3;
  editor.start();

  const svg = container.querySelector('svg');
  if (svg) {
    const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
    defs.innerHTML = '<marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#7c5cfc"/></marker>';
    svg.prepend(defs);
  }

  // Drop handler
  container.addEventListener('drop', ev => {
    ev.preventDefault();
    const agentId = ev.dataTransfer.getData('agentId');
    const a = agents.find(x => x.id === agentId);
    if (!a) return;
    const existing = Object.values(editor.drawflow.drawflow.Home.data);
    if (existing.some(n => n.data?.agentId === agentId)) return;
    const rect = container.getBoundingClientRect();
    const isFirst = Object.keys(editor.drawflow.drawflow.Home.data).length === 0;
    if (isFirst) startNodeId = agentId;
    editor.addNode(a.name, 1, 1, ev.clientX - rect.left, ev.clientY - rect.top, agentId, { agentId }, nodeHtml(a, agentId === startNodeId));
    if (isFirst) refreshStartBadges();
  });
  container.addEventListener('dragover', ev => ev.preventDefault());

  // Double-click node = set as start
  editor.on('nodeSelected', function(nodeId) {
    // Store for dblclick
    container._selectedNodeId = nodeId;
  });
  container.addEventListener('dblclick', () => {
    const nodeId = container._selectedNodeId;
    if (!nodeId) return;
    const n = editor.drawflow.drawflow.Home.data[nodeId];
    if (!n?.data?.agentId) return;
    startNodeId = n.data.agentId;
    refreshStartBadges();
    saveFlow();
    document.getElementById('flow-info').textContent = `⚡ Início: ${n.name}`;
  });

  // Return edges tracking
  window.returnEdges = new Set(); // "src->dst"

  // Auto-save on any change
  editor.on('nodeCreated', () => saveFlow());
  editor.on('nodeRemoved', () => saveFlow());
  editor.on('connectionCreated', () => saveFlow());
  editor.on('connectionRemoved', () => saveFlow());
  editor.on('nodeMoved', () => saveFlow());

  // Toggle return edge on right-click connection
  container.addEventListener('contextmenu', (ev) => {
    const conn = ev.target.closest('.connection');
    if (!conn) return;
    ev.preventDefault();
    const cls = conn.classList;
    const nodeOut = [...cls].find(c => c.startsWith('node_out_'))?.replace('node_out_','');
    const nodeIn = [...cls].find(c => c.startsWith('node_in_'))?.replace('node_in_','');
    if (!nodeOut || !nodeIn) return;
    const raw = editor.drawflow.drawflow.Home.data;
    const srcAgent = raw[nodeOut]?.data?.agentId;
    const dstAgent = raw[nodeIn]?.data?.agentId;
    if (!srcAgent || !dstAgent) return;
    const key = srcAgent + '->' + dstAgent;
    if (returnEdges.has(key)) { returnEdges.delete(key); } else { returnEdges.add(key); }
    styleReturnEdges();
    saveFlow();
    document.getElementById('flow-info').textContent = returnEdges.has(key)
      ? `↩ ${srcAgent} → ${dstAgent}: retorno obrigatório`
      : `→ ${srcAgent} → ${dstAgent}: handoff normal`;
  });

  window.styleReturnEdges = function styleReturnEdges() {
    const raw = editor.drawflow.drawflow.Home.data;
    container.querySelectorAll('.connection').forEach(conn => {
      const cls = conn.classList;
      const nodeOut = [...cls].find(c => c.startsWith('node_out_'))?.replace('node_out_','');
      const nodeIn = [...cls].find(c => c.startsWith('node_in_'))?.replace('node_in_','');
      if (!nodeOut || !nodeIn) return;
      const src = raw[nodeOut]?.data?.agentId;
      const dst = raw[nodeIn]?.data?.agentId;
      if (!src || !dst) return;
      const isReturn = returnEdges.has(src + '->' + dst);
      const path = conn.querySelector('.main-path');
      if (path) {
        path.style.stroke = isReturn ? '#f59e0b' : '';
        path.style.strokeDasharray = isReturn ? '8 4' : '';
      }
    });
  }

  loadFlow();
}

async function loadFlow() {
  if (!currentFlowId) return;
  const fd = flows.find(f => f.id === currentFlowId);
  if (!fd) return;
  startNodeId = fd.start_node || '';
  editor.clear();
  if (!fd.nodes.length) return;
  const idMap = {};
  for (const n of fd.nodes) {
    const a = agents.find(x => x.id === n.agent_id);
    if (!a) continue;
    if (!startNodeId) startNodeId = n.agent_id;
    const nid = editor.addNode(a.name, 1, 1, n.x, n.y, a.id, { agentId: a.id }, nodeHtml(a, n.agent_id === startNodeId));
    idMap[n.agent_id] = nid;
  }
  // Restore return edges
  returnEdges = new Set();
  for (const e of fd.edges) {
    if (e.returns) returnEdges.add(e.src + '->' + e.dst);
  }
  for (const e of fd.edges) {
    if (idMap[e.src] && idMap[e.dst]) {
      editor.addConnection(idMap[e.src], idMap[e.dst], 'output_1', 'input_1');
    }
  }
  refreshStartBadges();
  setTimeout(styleReturnEdges, 100);
}

let _saveFlowTimer = null;
let _saveFlowRunning = false;
function saveFlow() {
  clearTimeout(_saveFlowTimer);
  _saveFlowTimer = setTimeout(_doSaveFlow, 500);
}
async function _doSaveFlow() {
  if (_saveFlowRunning || !currentFlowId) return;
  _saveFlowRunning = true;
  try {
  const raw = editor.drawflow.drawflow.Home.data;
  const nodes = []; const edges = [];
  const nodeIdToAgent = {};
  for (const [nid, n] of Object.entries(raw)) {
    nodes.push({ agent_id: n.data.agentId, x: n.pos_x, y: n.pos_y });
    nodeIdToAgent[nid] = n.data.agentId;
  }
  for (const [nid, n] of Object.entries(raw)) {
    const conns = n.outputs?.output_1?.connections || [];
    for (const c of conns) {
      edges.push({ src: nodeIdToAgent[nid], dst: nodeIdToAgent[c.node], returns: returnEdges.has(nodeIdToAgent[nid] + '->' + nodeIdToAgent[c.node]) });
    }
  }
  const fd = flows.find(f => f.id === currentFlowId);
  const name = fd ? fd.name : 'Default';
  await fetch(`${API}/flows/${currentFlowId}`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ id: currentFlowId, name, nodes, edges, start_node: startNodeId }) });
  // Update local cache
  if (fd) { fd.nodes = nodes; fd.edges = edges; fd.start_node = startNodeId; }
  document.getElementById('flow-info').textContent = `✓ Salvo: ${nodes.length} nós, ${edges.length} conexões, início: ${startNodeId}`;
  } finally { _saveFlowRunning = false; }
}

function autoLayout() {
  const raw = editor.drawflow.drawflow.Home.data;
  const ids = Object.keys(raw);
  const cols = Math.ceil(Math.sqrt(ids.length));
  ids.forEach((id, i) => {
    const x = 80 + (i % cols) * 250;
    const y = 80 + Math.floor(i / cols) * 150;
    const el = document.getElementById('node-' + id);
    if (el) { el.style.left = x + 'px'; el.style.top = y + 'px'; raw[id].pos_x = x; raw[id].pos_y = y; }
  });
  editor.updateConnectionNodes('node-' + ids[0]);
}

let sessionOpen = false;
let chatTarget = null;  // null = swarm, string = agent_id, '__log__' = raw log
let eventSource = null;
let chatHistory = [];   // {type, text, label} — all messages stored for filtering

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function setStatus(text, running) {
  document.getElementById('status-text').textContent = text;
  document.getElementById('status-dot').className = `w-2 h-2 rounded-full ${running ? 'bg-amber-400 running' : 'bg-emerald-500'}`;
}
function getColor(name) {
  const a = agents.find(x => x.name === name);
  return a?.color || (name === 'GOD' ? '#fbbf24' : '#6b6b80');
}
function ts() { return new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'}); }

function setSessionUI(open) {
  sessionOpen = open;
  document.getElementById('btn-open').classList.toggle('hidden', open);
  document.getElementById('btn-close').classList.toggle('hidden', !open);
  document.getElementById('chat-input').disabled = !open;
  document.getElementById('btn-send').disabled = !open;
  document.getElementById('chat-header').innerHTML = open
    ? '<span class="w-2 h-2 rounded-full bg-emerald-500"></span><span class="text-sm text-white font-medium">Swarm ativo</span><span class="text-xs text-muted ml-2">Digite para enviar ao swarm, @agente para falar direto</span>'
    : '<span class="text-sm text-muted">Abra um projeto para começar</span>';
  setStatus(open ? 'Session open' : 'Ready', false);
}

// ── Open / Close ─────────────────────────────────────────────────────────

async function openSession() {
  const pid = document.getElementById('project-select').value;
  if (!pid) return;
  setStatus('Opening...', true);
  document.getElementById('chat-messages').innerHTML = '';
  document.getElementById('raw-log').innerHTML = '';
  document.getElementById('run-agents').innerHTML = '';
  chatHistory = [];

  const flowId = document.getElementById('run-flow-select').value || null;
  await fetch(`${API}/session/open/${pid}`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({flow_id: flowId}) });

  // Start SSE
  if (eventSource) eventSource.close();
  eventSource = new EventSource(`${API}/session/events`);
  eventSource.addEventListener('orch', e => handleSSE('orch', JSON.parse(e.data)));
  eventSource.addEventListener('agent', e => handleSSE('agent', JSON.parse(e.data)));
  eventSource.addEventListener('error', e => { try { handleSSE('error', JSON.parse(e.data)); } catch(ex){} });
  eventSource.addEventListener('summary', e => handleSSE('summary', JSON.parse(e.data)));
  eventSource.addEventListener('done', e => handleSSE('done', {}));

  setSessionUI(true);
}

async function closeSession() {
  if (eventSource) { eventSource.close(); eventSource = null; }
  await fetch(`${API}/session/close`, { method: 'POST' });
  setSessionUI(false);
  document.getElementById('run-agents').innerHTML = '';
}

function onProjectChange() {
  const pid = document.getElementById('project-select').value;
  document.getElementById('btn-open').classList.toggle('hidden', !pid);
  if (sessionOpen) closeSession();
}

async function stopAgent(name) {
  await fetch(`${API}/session/abort`, {method:'POST'});
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || !sessionOpen) return;
  input.value = '';

  // Parse @agent prefix
  const m = text.match(/^@(\w+)\s+(.*)/s);
  const agent_id = m ? m[1] : (chatTarget && chatTarget !== '__log__' ? chatTarget : null);
  const msg = m ? m[2] : text;

  // Show user message in chat
  addChatBubble('user', msg, agent_id ? `→ ${agent_id}` : '→ swarm');
  setStatus('Working...', true);

  await fetch(`${API}/session/message`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ text: msg, agent_id })
  });
}

// ── Agent grid (Swarm view) ───────────────────────────────────────────────

function ensureGridPanel(name) {
  let panel = document.getElementById('grid-' + name);
  if (panel) return panel;
  const grid = document.getElementById('agent-grid');
  const c = getColor(name);
  const div = document.createElement('div');
  div.id = 'grid-' + name;
  div.className = 'flex flex-col rounded-xl border border-border bg-card overflow-hidden min-h-0';
  div.style.borderTopColor = c; div.style.borderTopWidth = '2px';
  div.innerHTML = `
    <div class="flex items-center gap-2 px-3 py-2 border-b border-border bg-card/50 flex-shrink-0">
      <span class="w-2 h-2 rounded-full" style="background:${c}" id="grid-dot-${escHtml(name)}"></span>
      <span class="text-xs font-medium text-white">${escHtml(name)}</span>
      <span class="text-[10px] text-muted ml-auto" id="grid-status-${escHtml(name)}">Pronto</span>
      <button class="hidden text-[10px] text-red-400 hover:text-red-300 ml-1 px-1 rounded hover:bg-red-500/10" id="grid-stop-${escHtml(name)}" onclick="event.stopPropagation();stopAgent('${escHtml(name)}')">⏹</button>
    </div>
    <div class="flex-1 overflow-y-auto p-3 font-mono text-xs text-gray-400 whitespace-pre-wrap" id="grid-content-${escHtml(name)}"></div>`;
  grid.appendChild(div);
  return div;
}

function updateGridPanel(name, status, text) {
  ensureGridPanel(name);
  const s = document.getElementById('grid-status-' + name);
  const d = document.getElementById('grid-dot-' + name);
  const stop = document.getElementById('grid-stop-' + name);
  if (s) s.textContent = status;
  if (d) { d.style.background = status === '💀 Crashed' ? '#ef4444' : getColor(name); d.className = `w-2 h-2 rounded-full ${status === 'Processando...' ? 'running' : ''}`; }
  if (stop) stop.classList.toggle('hidden', status !== 'Processando...');
  if (text !== undefined) {
    const c = document.getElementById('grid-content-' + name);
    if (c) { c.textContent = text; if (c.textContent.length > 5000) c.textContent = '...\n' + c.textContent.slice(-4000); c.scrollTop = c.scrollHeight; }
  }
}

function appendGridPanel(name, text) {
  ensureGridPanel(name);
  const c = document.getElementById('grid-content-' + name);
  if (c) { c.textContent += text; if (c.textContent.length > 5000) c.textContent = '...\n' + c.textContent.slice(-4000); c.scrollTop = c.scrollHeight; }
}

function showView(view) {
  document.getElementById('agent-grid').classList.toggle('hidden', view !== 'grid');
  document.getElementById('chat-messages').classList.toggle('hidden', view !== 'chat');
  document.getElementById('raw-log').classList.toggle('hidden', view !== 'log');
}

// ── Chat rendering ───────────────────────────────────────────────────────

function addChatBubble(type, text, label) {
  chatHistory.push({type, text, label});
  // If this message matches current filter, append it directly (avoid full re-render)
  if (shouldShow({type, text, label})) {
    appendBubble(type, text, label);
  }
}

function shouldShow(msg) {
  if (!chatTarget || chatTarget === '__log__') return true; // swarm or log: show all
  // For agent view: show only that agent's responses + user messages sent to that agent + summaries/system
  if (msg.type === 'agent') return msg.label === chatTarget;
  if (msg.type === 'user') return !msg.label || msg.label === `→ ${chatTarget}`;
  return msg.type === 'summary' || msg.type === 'system';
}

function renderChat() {
  const el = document.getElementById('chat-messages');
  el.innerHTML = '';
  chatHistory.filter(shouldShow).forEach(m => appendBubble(m.type, m.text, m.label));
  const scroll = document.getElementById('chat-scroll');
  scroll.scrollTop = scroll.scrollHeight;
}

function appendBubble(type, text, label) {
  const el = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'log-line';

  if (type === 'user') {
    div.innerHTML = `<div class="flex justify-end"><div class="max-w-[75%] bg-accent/10 border border-accent/20 rounded-xl rounded-tr-sm px-4 py-2.5">
      <div class="text-[10px] text-accent/60 mb-1">${ts()} ${escHtml(label||'')}</div>
      <div class="text-sm text-white whitespace-pre-wrap">${escHtml(text)}</div>
    </div></div>`;
  } else if (type === 'agent') {
    const c = getColor(label);
    div.innerHTML = `<div class="flex justify-start"><div class="max-w-[75%] bg-card border border-border rounded-xl rounded-tl-sm px-4 py-2.5">
      <div class="text-[10px] mb-1" style="color:${c}">${ts()} ${escHtml(label||'')}</div>
      <div class="text-sm text-gray-300 whitespace-pre-wrap">${escHtml(text)}</div>
    </div></div>`;
  } else if (type === 'summary') {
    div.innerHTML = `<div class="flex justify-center"><div class="bg-emerald-500/5 border border-emerald-500/20 rounded-xl px-4 py-2.5 max-w-[80%]">
      <div class="text-[10px] text-emerald-400 mb-1">${ts()} ✓ Resumo</div>
      <div class="text-sm text-emerald-300">${escHtml(text)}</div>
    </div></div>`;
  } else if (type === 'system') {
    div.innerHTML = `<div class="flex justify-center"><div class="text-[10px] text-muted bg-surface/50 px-3 py-1 rounded-full">${escHtml(text)}</div></div>`;
  }

  el.appendChild(div);
  const scroll = document.getElementById('chat-scroll');
  if (isNearBottom(scroll)) scroll.scrollTop = scroll.scrollHeight;
}

// ── Agent boxes ──────────────────────────────────────────────────────────

const agentStatus = {};  // name → {status, lastText}

function updateAgentBox(name, status, text) {
  agentStatus[name] = { status, text: (text||'').slice(0,60) };
  renderAgentBoxes();
}

function renderAgentBoxes() {
  const el = document.getElementById('run-agents');
  el.innerHTML = Object.entries(agentStatus).filter(([n]) => n !== 'GOD').map(([name, s]) => {
    const c = getColor(name);
    const isSel = chatTarget === name;
    const isActive = s.status === 'working';
    return `<div onclick="selectChatTarget('${escHtml(name)}')"
      class="agent-box flex flex-col gap-1 px-3 py-2.5 rounded-lg border cursor-pointer transition ${isSel ? 'border-accent/50 bg-accent/5' : 'border-border bg-surface hover:border-accent/20'}">
      <div class="flex items-center gap-2">
        <span class="w-2 h-2 rounded-full ${isActive?'running':''}" style="background:${c}"></span>
        <span class="text-xs font-medium text-white">${escHtml(name)}</span>
      </div>
      <div class="text-[10px] text-muted truncate">${escHtml(s.text||'Pronto')}</div>
    </div>`;
  }).join('');
}

function selectChatTarget(target) {
  chatTarget = target;
  renderAgentBoxes();

  document.querySelectorAll('.agent-box').forEach(b => { b.classList.remove('border-accent/50','bg-accent/5'); b.classList.add('border-border','bg-surface'); });

  if (target === '__log__') {
    showView('log');
    document.getElementById('chat-header').innerHTML = '<span class="text-sm text-muted">📋 Log bruto</span>';
    document.getElementById('chat-input').placeholder = 'Mensagem para o swarm...';
    document.getElementById('box-__log__').classList.add('border-accent/50','bg-accent/5');
  } else if (target) {
    showView('chat');
    const c = getColor(target);
    document.getElementById('chat-header').innerHTML = `<span class="w-2 h-2 rounded-full" style="background:${c}"></span><span class="text-sm font-medium text-white">${escHtml(target)}</span><span class="text-xs text-muted ml-2">Chat direto com este agente</span>`;
    document.getElementById('chat-input').placeholder = `Mensagem para ${target}...`;
  } else {
    showView('grid');
    document.getElementById('chat-header').innerHTML = sessionOpen
      ? '<span class="w-2 h-2 rounded-full bg-emerald-500"></span><span class="text-sm text-white font-medium">Swarm</span><span class="text-xs text-muted ml-2">Visão geral de todos os agentes</span>'
      : '<span class="text-sm text-muted">Abra um projeto para começar</span>';
    document.getElementById('chat-input').placeholder = 'Mensagem para o swarm... (@agente para falar direto)';
    document.getElementById('box-swarm').classList.add('border-accent/50','bg-accent/5');
    document.getElementById('box-swarm').classList.remove('border-border','bg-surface');
  }
}

// ── Raw log ──────────────────────────────────────────────────────────────

function appendLog(html) {
  const log = document.getElementById('raw-log');
  const div = document.createElement('div');
  div.className = 'log-line'; div.innerHTML = html; log.appendChild(div);
  if (chatTarget === '__log__') {
    const scroll = document.getElementById('chat-scroll');
    if (isNearBottom(scroll)) scroll.scrollTop = scroll.scrollHeight;
  }
}

// ── SSE handler ──────────────────────────────────────────────────────────

function handleSSE(type, data) {
  const t = ts();
  if (type === 'orch') {
    appendLog(`<span class="text-muted">${t}</span> <span class="text-amber-400 font-medium">[ORCH]</span> ${escHtml(data.msg)}`);
    const hm = data.msg.match(/^→ (.+?): (.+)/);
    if (hm) addChatBubble('system', `→ Handoff para ${hm[1]}: ${hm[2]}`);
    const rm = data.msg.match(/^Round (\d+): (.+)/);
    if (rm) updateAgentBox(rm[2], 'working', 'Processando...');
  } else if (type === 'agent') {
    const c = data.name === 'GOD' ? '#fbbf24' : getColor(data.name);
    appendLog(`<span class="text-muted">${t}</span> <span style="color:${c}" class="font-medium">[${escHtml(data.name)}]</span> <span class="text-muted">${escHtml(data.event)}</span>`);
    if (data.text) {
      for (const l of data.text.split('\n').slice(0,15))
        appendLog(`<span class="text-muted ml-4">│</span> <span class="text-gray-400">${escHtml(l)}</span>`);
    }
    if (data.name !== 'GOD') {
      if (data.event.includes('ready')) {
        updateAgentBox(data.name, 'ready', 'Pronto');
        updateGridPanel(data.name, 'Pronto');
      }
      if (data.event.includes('← prompt') || data.event.includes('← direct')) {
        updateAgentBox(data.name, 'working', 'Processando...');
        updateGridPanel(data.name, 'Processando...', '');
      }
      if (data.event === '⏳ streaming') {
        updateAgentBox(data.name, 'working', (data.text||'').slice(0,60));
        appendGridPanel(data.name, data.text||'');
        return;
      }
      if (data.event.includes('→ response')) {
        updateAgentBox(data.name, 'ready', (data.text||'').slice(0,60));
        updateGridPanel(data.name, 'Pronto');
        addChatBubble('agent', data.text||'', data.name);
      }
    }
  } else if (type === 'summary') {
    addChatBubble('summary', data.text);
    setStatus('Session open');
  } else if (type === 'error') {
    appendLog(`<span class="text-muted">${t}</span> <span class="text-red-400">[ERROR]</span> ${escHtml(data.msg)}`);
  } else if (type === 'done') {
    setStatus('Session open');
  }
}

// ── Scroll-to-bottom ─────────────────────────────────────────────────────
function isNearBottom(el, threshold=100) { return (el.scrollHeight - el.scrollTop - el.clientHeight) < threshold; }
(function(){
  const sc = document.getElementById('chat-scroll'), btn = document.getElementById('scroll-to-bottom');
  sc.addEventListener('scroll', () => btn.classList.toggle('visible', !isNearBottom(sc)));
  btn.addEventListener('click', () => sc.scrollTo({top: sc.scrollHeight, behavior:'smooth'}));
})();

// ── Init ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => { if (e.key==='Escape') { closeModal(); closeProjectModal(); } });
loadAgents();
loadProjects();
loadFlows();
</script>
