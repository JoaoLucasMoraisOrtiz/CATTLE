<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReDo!</title>
<link rel="stylesheet" href="lib/xterm.css">
<link rel="stylesheet" href="src/css/base.css">
<link rel="stylesheet" href="src/css/panes.css">
<link rel="stylesheet" href="src/css/modals.css">
<link rel="stylesheet" href="src/css/sidebar.css">
<link rel="stylesheet" href="src/css/input.css">
<link rel="stylesheet" href="src/css/codeview.css">
<link rel="stylesheet" href="src/css/promptbuilder.css">
</head>
<body>
  <div id="app">
    <!-- Home screen -->
    <div id="home-screen">
      <h1>ReDo! <span style="opacity:.4;font-size:.5em">v2</span></h1>
      <p class="home-subtitle">Open a project to start</p>
      <div id="home-projects"></div>
      <button class="btn-new-project" onclick="showNewProjectForm()">+ New Project</button>
      <button class="btn-new-project" onclick="showSettings()" style="margin-top:8px;border-style:solid">⚙ Settings</button>
    </div>

    <!-- Workspace (hidden until a project is opened) -->
    <div id="workspace" style="display:none">
      <div id="tabs"></div>
      <div id="workspace-body">
        <div id="sidebar">
          <div class="sidebar-header">
            <span>📚 Knowledge Base</span>
          </div>
          <div id="kb-list"></div>
          <div class="sidebar-actions">
            <button onclick="addKBDoc()" style="width:100%">+ Add Document</button>
          </div>
          <button class="btn-reindex" onclick="reindexKB()">↻ Reindex All</button>
        </div>
        <div id="main-area">
          <div id="panes"></div>
          <div id="pb-pill" onclick="togglePromptBuilder()">📝 Prompt</div>
        </div>
        <!-- Code Viewer right panel -->
        <div id="code-panel-tab" onclick="toggleCodePanel()">◀ Code</div>
        <div id="code-panel" style="display:none">
          <div id="code-panel-resize" onmousedown="startResizeCodePanel(event)"></div>
          <div id="code-panel-header">
            <div id="cv-tabs">
              <span class="cv-tab active" onclick="switchCVTab('gitlog',this)">Git Log</span>
              <span class="cv-tab" onclick="switchCVTab('graph',this)">Graph</span>
              <span class="cv-tab" onclick="switchCVTab('simulator',this)">Simulator</span>
            </div>
            <button onclick="openCodeConfig()" style="background:none;border:none;color:#8b949e;cursor:pointer;font-size:13px">⚙</button>
            <span style="cursor:pointer;color:#8b949e" onclick="toggleCodePanel()">▶</span>
          </div>
          <div id="cv-selectors">
            <select id="cv-repo-select" onchange="onRepoChange()"></select>
            <select id="cv-branch-select" onchange="onBranchChange()"></select>
            <select id="cv-commit-select" onchange="onCommitChange(this.value)"></select>
          </div>
          <div id="code-panel-inner">
            <div id="cv-view-gitlog">
              <div id="cv-timeline"></div>
              <div id="cv-detail"></div>
            </div>
            <div id="cv-view-graph" style="display:none">
              <div id="graph-toolbar">
                <span id="graph-info" style="color:#8b949e;font-size:11px"></span>
              </div>
              <svg id="graph-svg"></svg>
            </div>
            <div id="cv-view-simulator" style="display:none">
              <div style="padding:24px;color:#8b949e;text-align:center;font-size:13px">🔜 Simulator — coming soon</div>
            </div>
          </div>
        </div>
      </div>
      <!-- Prompt Builder panel (replaces input-area when open) -->
      <div id="pb-panel" style="display:none">
        <div id="pb-resize" onmousedown="startResizePB(event)"></div>
        <div id="pb-container">
          <div id="pb-left">
            <div class="pb-section-header">📍 Symbols <span id="pb-status" style="font-weight:normal;color:#8b949e;font-size:11px"></span></div>
            <div id="pb-nodes"></div>
            <div class="pb-section-header" style="margin-top:8px">🔗 Graph</div>
            <div id="pb-graph"></div>
          </div>
          <div id="pb-right">
            <div class="pb-section-header">📝 Prompt</div>
            <div id="pb-intent-row">
              <input id="pb-intent" type="text" placeholder="What do you want to do?" onkeydown="if(event.key==='Enter')pbSearch()">
              <button class="btn-spawn" onclick="pbSearch()" style="font-size:11px;padding:4px 12px">🔍 Search</button>
            </div>
            <textarea id="pb-prompt" spellcheck="false" placeholder="Prompt will be built here..."></textarea>
            <div id="pb-actions">
              <button class="btn-spawn" onclick="pbSend()">💬 Send</button>
              <button class="btn-cancel" onclick="pbCopy()">📋 Copy</button>
            </div>
          </div>
        </div>
      </div>
      <div id="input-area">
        <div id="term-panel">
          <div id="term-panel-bar" onclick="toggleTermPanel()">
            <span>Terminal</span>
            <div id="term-tabs"></div>
            <button id="term-add-btn" onclick="event.stopPropagation(); addShellTab()">+</button>
          </div>
          <div id="term-panel-body" style="display:none">
            <div id="term-panel-content"></div>
          </div>
        </div>
        <div id="injection-preview"></div>
        <div id="input-row">
          <label class="ctx-toggle" title="Context search on/off">
            <input id="ctx-toggle" type="checkbox" checked onchange="onCtxToggle()"> 📚
          </label>
          <span id="prompt">&gt;</span>
          <input id="input" type="text" placeholder="Click here to use @agent broadcast (Esc to return to terminal)" >
          <button id="send-btn" onclick="sendMessage()">Send</button>
        </div>
      </div>
      <div id="status-bar"></div>
    </div>
  </div>

<!-- Project Picker Modal -->
<div id="project-modal" class="modal-overlay" onclick="if(event.target===this)closeProjectModal()">
  <div class="modal">
    <h3>Open Project</h3>
    <div id="project-list"></div>
    <hr style="border-color:#30363d;margin:12px 0">
    <button class="btn-new-project" onclick="closeProjectModal();showNewProjectForm()">+ New Project</button>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeProjectModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- New Project Modal -->
<div id="new-project-modal" class="modal-overlay" onclick="if(event.target===this)closeNewProjectModal()">
  <div class="modal">
    <h3>New Project</h3>
    <label>Name</label>
    <input id="new-proj-name" type="text" placeholder="my-project">
    <label>Path</label>
    <input id="new-proj-path" type="text" placeholder="/home/user/projects/my-project">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeNewProjectModal()">Cancel</button>
      <button class="btn-spawn" onclick="createProject()">Create</button>
    </div>
  </div>
</div>

<!-- Settings Modal -->
<div id="settings-modal" class="modal-overlay" onclick="if(event.target===this)closeSettings()">
  <div class="modal">
    <h3>⚙ Settings</h3>
    <div class="toggle-row">
      <label class="toggle-label">
        <input id="set-sqlite" type="checkbox"> SQLite Database (embeddings, RAG, conversation history)
      </label>
    </div>
    <div id="sqlite-warning" style="display:none;color:#da3633;font-size:11px;padding:4px 0 8px;margin-left:24px">
      ⚠ Disabling will delete all stored data (embeddings, conversation history, KB chunks)
    </div>
    <label>Gemini API Key <span style="color:#8b949e;font-size:11px">(for image descriptions)</span></label>
    <input id="set-gemini" type="password" placeholder="AIza...">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeSettings()">Cancel</button>
      <button class="btn-spawn" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

<!-- KB Document Viewer Modal -->
<div id="kb-viewer-modal" class="modal-overlay" onclick="if(event.target===this)closeKBViewer()">
  <div class="modal modal-large">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <h3 id="kb-viewer-title" style="margin:0"></h3>
      <span style="cursor:pointer;color:#8b949e;font-size:18px" onclick="closeKBViewer()">✕</span>
    </div>
    <div class="kb-viewer-tabs">
      <button class="kb-vtab active" onclick="switchKBView('doc',this)">📄 Document</button>
      <button class="kb-vtab" onclick="switchKBView('chunks',this)">🧩 Chunks</button>
    </div>
    <div id="kb-viewer-content" class="kb-viewer-body"></div>
  </div>
</div>

<!-- Spawn Agent Modal -->
<div id="spawn-modal" class="modal-overlay" onclick="if(event.target===this)closeSpawnModal()">
  <div class="modal">
    <h3>New Agent</h3>
    <label>Name</label>
    <input id="spawn-name" type="text" placeholder="backend, frontend, tester...">
    <label>Agent Type</label>
    <div id="agent-buttons" class="agent-grid">
      <button class="agent-btn" data-cmd="kiro-cli chat" data-type="kiro" data-yolo="-a" onclick="selectAgentType(this)">
        <span class="agent-icon">⚡</span> Kiro
      </button>
      <button class="agent-btn" data-cmd="gemini" data-type="gemini" data-yolo="-y" onclick="selectAgentType(this)">
        <span class="agent-icon">💎</span> Gemini
      </button>
      <button class="agent-btn" data-cmd="claude" data-type="claude" data-yolo="--dangerously-skip-permissions" onclick="selectAgentType(this)">
        <span class="agent-icon">🟣</span> Claude
      </button>
      <button class="agent-btn" data-cmd="codex" data-type="codex" data-yolo="--full-auto" onclick="selectAgentType(this)">
        <span class="agent-icon">🔵</span> Codex
      </button>
    </div>
    <div class="yolo-row">
      <label class="toggle-label">
        <input id="spawn-yolo" type="checkbox"> YOLO mode (auto-approve)
      </label>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeSpawnModal()">Cancel</button>
      <button class="btn-spawn" id="btn-do-spawn" onclick="doSpawn()" disabled>Spawn</button>
    </div>
  </div>
</div>
  <script src="lib/d3.min.js"></script>
  <script src="lib/xterm.js"></script>
  <script src="lib/xterm-addon-fit.js"></script>
  <script src="src/js/settings.js"></script>
  <script src="src/js/terminal.js"></script>
  <script src="src/js/kb.js"></script>
  <script src="src/js/input.js"></script>
  <script src="src/js/promptbuilder.js"></script>
  <script src="src/js/main.js"></script>
  <script src="src/js/codeview.js"></script>
</body>
</html>
